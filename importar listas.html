<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Envio de Dados das Listas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 20px; background: #f8f9fa; }
    .preview-table { max-height: 650px; overflow: auto; }
    textarea { font-family: monospace; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="mb-4">📦 Envio de Listas + Motorista + CTes</h2>

    <!-- ETAPA 1 -->
    <div class="card mb-5">
      <div class="card-header bg-primary text-white">
        <h5>1️⃣ Etapa 1 – Cole os dados das Listas</h5>
      </div>
      <div class="card-body">
        <textarea id="entradaListas" class="form-control" rows="15" placeholder="Cole aqui a tabela completa..."></textarea>
        <button class="btn btn-primary mt-3" onclick="processarEEnviarListas()">Enviar Listas para o Banco</button>
      </div>
    </div>

    <!-- NOVA SEÇÃO: GERENCIAMENTO -->
    <div class="card mb-5">
      <div class="card-header bg-danger text-white">
        <h5>⚠️ Gerenciamento de Listas – Reset / Apagar</h5>
      </div>
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-md-4">
            <label class="form-label fw-bold">Número da Lista</label>
            <input type="number" id="numeroListaGestao" class="form-control" placeholder="Ex: 1458">
          </div>
          <div class="col-md-8">
            <button class="btn btn-warning me-2" onclick="resetarLista()">
              🔄 Resetar Lista
            </button>
            <button class="btn btn-danger" onclick="apagarLista()">
              🗑️ Apagar Lista
            </button>
            <small class="text-muted d-block mt-2">
              O 
            </small>
          </div>
        </div>
      </div>
    </div>

    <!-- ETAPA 2 -->
    <div class="card">
      <div class="card-header bg-success text-white d-flex justify-content-between">
        <h5>2️⃣ Etapa 2 – Listas Pendentes</h5>
        <button class="btn btn-light btn-sm" onclick="carregarListasPendentes()">🔄 Atualizar Lista</button>
      </div>
      <div class="card-body">
        <div id="previewPendentes" class="preview-table">
          <p class="text-muted text-center py-4">Clique em Atualizar Lista...</p>
        </div>
      </div>
    </div>
  </div>
<!-- Modal Informar Métrica (novo - obrigatório) -->
  <div class="modal fade" id="modalMetrica" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Informar Métrica – Lista <span id="modalNumListaMetrica" class="text-primary"></span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <label class="form-label">Selecione a Métrica da Lista:</label>
          <select id="selectMetrica" class="form-select">
            <option value="">Selecione...</option>
            <option value="Por Entrega">Por Entrega</option>
            <option value="Volumoso">Volumoso</option>
            <option value="Apha">Apha</option>
            <option value="Baixa">Baixa</option>
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-success" onclick="salvarMetrica()">✅ Confirmar Métrica</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Motorista -->
  <div class="modal fade" id="modalMotorista" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Definir Motorista – Lista <span id="modalNumListaMotor" class="text-primary"></span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <label class="form-label">Selecione o Motorista:</label>
          <select id="selectMotorista" class="form-select" size="10"></select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-success" onclick="salvarMotorista()">✅ Confirmar Motorista</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal CTes -->
  <div class="modal fade" id="modalCtes" tabindex="-1">
    <div class="modal-dialog modal-xl">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Adicionar CTes – Lista <span id="modalNumListaCtes" class="text-primary"></span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="text-muted">Cole o relatório de CTes desta lista:</p>
          <textarea id="entradaCtesModal" class="form-control" rows="16"></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-success" onclick="processarCtesModal()">✅ Salvar CTes</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const WEBHOOK_LISTAS = "https://webhook.sactudo.com.br/webhook/listass";
    const WEBHOOK_PENDENTES = "https://webhook.sactudo.com.br/webhook/listas-pendentes";
    const WEBHOOK_MOTORISTAS = "https://webhook.sactudo.com.br/webhook/matricula_lista";
    const WEBHOOK_MATRICULA = "https://webhook.sactudo.com.br/webhook/matricula_lista";
    const WEBHOOK_METRICA = "https://webhook.sactudo.com.br/webhook/metrica_lista";
    const WEBHOOK_CTES = "https://webhook.sactudo.com.br/webhook/ctes";
    const WEBHOOK_RESET = "https://webhook.sactudo.com.br/webhook/listas-reset";  // Novo webhook

    let listaAtual = null;
    let matriculaAtualDaLista = null;
    let metricaAtualDaLista = null;

    // ====================== FUNÇÕES EXISTENTES (mantidas iguais) ======================
    // ====================== FUNÇÃO QUE VOCÊ FORNECEU (integrada) ======================
    function parseListas(texto) {
      const linhas = texto.trim().split("\n").filter(l => l.trim() !== "");
      const dados = [];
      const erros = [];
      const startIndex = linhas[0].toLowerCase().includes("número") ? 1 : 0;

      for (let i = startIndex; i < linhas.length; i++) {
        const linha = linhas[i].trim();
        if (!linha) continue;

        // Prioridade: split por TAB
        let partes = linha.split("\t").map(p => p.trim());
        // Fallback: split por 2+ espaços
        if (partes.length < 7) {
          partes = linha.split(/\s{2,}/).map(p => p.trim());
        }
        if (partes.length < 7) {
          erros.push(`Linha ${i + 1} incompleta (${partes.length} colunas)`);
          continue;
        }

        try {
          const numero = parseInt(partes[0]);
          const qtd = parseInt(partes[1]);
          const peso = parseFloat(partes[2].replace(",", ".")) || 0;
          const valor = parseFloat(partes[3].replace("R$", "").replace(".", "").replace(",", ".")) || 0;
          const dataEmissao = parseDateToISO(partes[4]);

          // partes[5] = Data Baixa OU "Em aberto"
          const campoBaixa = partes[5] || "";
          let dataBaixa = null;
          let status = "Em aberto";
          let offsetTipo = 6;

          if (campoBaixa.toLowerCase().includes("aberto") || campoBaixa.trim() === "") {
            dataBaixa = null;
            status = "Em aberto";
            offsetTipo = 6;
          } else if (campoBaixa.match(/^\d{2}\/\d{2}\/\d{4}/)) {
            dataBaixa = parseDateToISO(campoBaixa);
            status = "Finalizado";
            offsetTipo = 6;
          }

          const tipo = partes[offsetTipo] || "";
          const rota = partes.slice(offsetTipo + 1).join(" ").trim();

          if (isNaN(numero) || isNaN(qtd)) {
            erros.push(`Linha ${i + 1} com número/qtd inválido`);
            continue;
          }

          dados.push({
            numero,
            qtd,
            peso,
            valor,
            data_emissao: dataEmissao,
            data_baixa: dataBaixa,
            status,
            tipo,
            rota,
            nome_completo: null,
            qtd_ctes: 0
          });
        } catch (e) {
          erros.push(`Linha ${i + 1} erro: ${e.message}`);
        }
      }

      if (erros.length > 0) alert("Erros encontrados:\n" + erros.join("\n"));
      return { dados, erros };
    }

    function parseDateToISO(dateStr) {
      if (!dateStr || dateStr.toLowerCase().includes("aberto")) return null;
      try {
        const [data, hora] = dateStr.split(" ");
        const [dia, mes, ano] = data.split("/");
        const [h, m, s = "00"] = (hora || "00:00:00").split(":");
        const dt = new Date(ano, mes - 1, dia, h, m, s);
        return isNaN(dt.getTime()) ? null : dt.toISOString().replace("Z", "-03:00");
      } catch (e) {
        return null;
      }
    }

    // ====================== Envio das Listas ======================
    function processarEEnviarListas() {
      const texto = document.getElementById("entradaListas").value.trim();
      if (!texto) return alert("Cole os dados das listas!");

      const { dados } = parseListas(texto);
      if (dados.length === 0) return;

      fetch(WEBHOOK_LISTAS, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(dados)
      })
      .then(r => r.text())
      .then(txt => {
        alert(`✅ ${dados.length} listas enviadas com sucesso!\n${txt}`);
        document.getElementById("entradaListas").value = "";
      })
      .catch(err => alert("Erro no envio: " + err.message));
    }


    // ====================== ETAPA 2 ======================
    async function carregarListasPendentes() {
      const container = document.getElementById("previewPendentes");
      container.innerHTML = `<div class="text-center py-5"><div class="spinner-border"></div><p>Carregando...</p></div>`;

      try {
        const resp = await fetch(WEBHOOK_PENDENTES);
        const listas = await resp.json();
        const pendentes = listas.filter(l => l["qtd_ctes"] == null || l["qtd_ctes"] === 0);

        if (pendentes.length === 0) {
          container.innerHTML = `<div class="alert alert-success">Todas as listas já possuem CTes.</div>`;
          return;
        }

        let html = `<table class="table table-hover table-striped"><thead class="table-dark"><tr>
          <th>Número</th><th>Qtd</th><th>Data Emissão</th><th>Status</th><th>Rota</th><th>Métrica</th><th>Motorista</th><th class="text-center">Ações</th>
        </tr></thead><tbody>`;

        pendentes.forEach(l => {
          const temMotorista = !!l["matricula_motorista"];
          const temMetrica = !!l["metrica_da_lista"];
          html += `<tr>
            <td><strong>${l["Número"]}</strong></td>
            <td>${l["Qtd"]}</td>
            <td>${l["Data Emissão"] ? l["Data Emissão"].substring(0,16).replace("T"," ") : ""}</td>
            <td>${l["status"] || ""}</td>
            <td>${l["Rota"]}</td>
            <td>${l["metrica_da_lista"]}</td>
            <td>${l["nome_completo"] || "—"}</td>
            <td class="text-center">
              <button class="btn btn-sm btn-info" onclick="abrirModalMetrica(${l["Número"]}); event.stopImmediatePropagation();">Métrica</button>
              <button class="btn btn-sm btn-warning" onclick="abrirModalMotorista(${l["Número"]}); event.stopImmediatePropagation();">Motorista</button>
              <button class="btn btn-sm ${temMotorista && temMetrica ? 'btn-success' : 'btn-secondary'}" 
                      ${temMotorista && temMetrica ? '' : 'disabled'}
                      onclick="abrirModalCtes(${l["Número"]}); event.stopImmediatePropagation();">CTes</button>
            </td>
          </tr>`;
        });

        html += `</tbody></table>`;
        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = `<div class="alert alert-danger">Nenhuma lista pendente.</div>`;
      }
    }

    // ====================== Novo Modal: Métrica ======================
    function abrirModalMetrica(numero) {
      listaAtual = numero;
      document.getElementById("modalNumListaMetrica").textContent = numero;
      document.getElementById("selectMetrica").value = "";
      new bootstrap.Modal(document.getElementById("modalMetrica")).show();
    }

   async function salvarMetrica() {
  const metrica = document.getElementById("selectMetrica").value;
  if (!metrica) return alert("Selecione uma métrica!");

  metricaAtualDaLista = metrica;

  try {
    await fetch(WEBHOOK_METRICA, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ numero_lista: listaAtual, metrica_da_lista: metrica })
    });
    alert(`✅ Métrica "${metrica}" salva!`);
    bootstrap.Modal.getInstance(document.getElementById("modalMetrica")).hide();
    setTimeout(carregarListasPendentes, 500);
  } catch (e) {
    alert("Erro ao salvar métrica.");
  }
}

    // ====================== Modal Motorista ======================
    async function abrirModalMotorista(numero) {
      listaAtual = numero;
      document.getElementById("modalNumListaMotor").textContent = numero;
      const select = document.getElementById("selectMotorista");
      select.innerHTML = `<option>Carregando...</option>`;
      try {
        const resp = await fetch(WEBHOOK_MOTORISTAS);
        const motoristas = await resp.json();
        let options = `<option value="">Selecione...</option>`;
        motoristas.forEach(m => {
          options += `<option value="${m.OperadorMatricula}">${m.OperadorMatricula} - ${m.nome_completo}</option>`;
        });
        select.innerHTML = options;
      } catch (e) {}
      new bootstrap.Modal(document.getElementById("modalMotorista")).show();
    }

    async function salvarMotorista() {
      const matricula = document.getElementById("selectMotorista").value;
      if (!matricula) return alert("Selecione um motorista!");
      matriculaAtualDaLista = parseInt(matricula);
      try {
        await fetch(WEBHOOK_MATRICULA, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ numero_lista: listaAtual, OperadorMatricula: matriculaAtualDaLista })
        });
        alert("✅ Motorista salvo!");
        bootstrap.Modal.getInstance(document.getElementById("modalMotorista")).hide();
        setTimeout(carregarListasPendentes, 600);
      } catch (e) {
        alert("Erro ao salvar motorista.");
      }
    }

    // ====================== Modal CTes ======================
    async function abrirModalCtes(numero) {
      listaAtual = numero;
      document.getElementById("modalNumListaCtes").textContent = numero;
      document.getElementById("entradaCtesModal").value = "";
      try {
        const resp = await fetch(WEBHOOK_PENDENTES);
        const listas = await resp.json();
        const listaInfo = listas.find(l => l["Número"] == numero);
        matriculaAtualDaLista = listaInfo && listaInfo["matricula_motorista"] ? parseInt(listaInfo["matricula_motorista"]) : null;
      } catch (e) {}
      new bootstrap.Modal(document.getElementById("modalCtes")).show();
    }

    async function processarCtesModal() {
      const texto = document.getElementById("entradaCtesModal").value.trim();
      if (!texto) return alert("Cole os CTes!");
      if (!matriculaAtualDaLista) return alert("❌ Defina o motorista antes!");

      const ctes = parseCtes(texto, listaAtual);
      if (ctes.length === 0) return alert("Nenhum CTe válido!");

      try {
        await fetch(WEBHOOK_CTES, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(ctes)
        });
        alert(`✅ ${ctes.length} CTes salvos!`);
        bootstrap.Modal.getInstance(document.getElementById("modalCtes")).hide();
        setTimeout(carregarListasPendentes, 700);
      } catch (e) {
        alert("Erro ao salvar CTes.");
      }
    }

   function parseCtes(texto, numeroLista) {
  const linhas = texto.split("\n").filter(l => l.trim() !== "");
  const ctes = [];

  const startIndex = linhas[0].toLowerCase().includes("remessa") ? 1 : 0;

  linhas.slice(startIndex).forEach((linha, idx) => {
    let partes = linha.split("\t").map(p => p.trim());
    if (partes.length < 2) partes = linha.split(/\s{2,}/).map(p => p.trim());

    // Mínimo: remessa + destinatário (tolera linhas sem telefone/data)
    if (partes.length < 6) {
      console.warn(`CTe linha ${idx + 1 + startIndex} ignorada:`, linha);
      return;
    }

    const dataAgendada = partes[7] && partes[7].trim() !== "" ? partes[7].trim() : null;

    ctes.push({
      remessa:             partes[0],
      endereco:            partes[1],
      bairro:              partes[2],
      cidade:              partes[3],
      cep:                 partes[4],
      destinatario:        partes[5],
      telefone:            partes[6] || null,
      data_agendada:       dataAgendada,
      numero_lista:        numeroLista,
      matricula_motorista: matriculaAtualDaLista,
      metrica_da_lista:    metricaAtualDaLista     // ← estava faltando
    });
  });

  return ctes;
}

    // ====================== NOVAS FUNÇÕES ======================
    async function resetarLista() {
      const numero = document.getElementById("numeroListaGestao").value.trim();
      if (!numero) return alert("❌ Digite o número da lista!");

      if (!confirm(`Deseja realmente RESETAR a lista ${numero}?`)) return;

      try {
        const response = await fetch(WEBHOOK_RESET, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            numero_lista: parseInt(numero),
            acao: "reset"
          })
        });

        const result = await response.text();
        alert(`✅ Reset solicitado com sucesso!\nLista: ${numero}\n${result}`);
        document.getElementById("numeroListaGestao").value = "";
        setTimeout(carregarListasPendentes, 800);
      } catch (err) {
        alert("Erro ao resetar lista: " + err.message);
      }
    }

    async function apagarLista() {
      const numero = document.getElementById("numeroListaGestao").value.trim();
      if (!numero) return alert("❌ Digite o número da lista!");

      if (!confirm(`⚠️ DESEJA REALMENTE APAGAR a lista ${numero}?\n\nEsta ação não pode ser desfeita!`)) return;

      try {
        const response = await fetch(WEBHOOK_RESET, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            numero_lista: parseInt(numero),
            acao: "delete"
          })
        });

        const result = await response.text();
        alert(`🗑️ Exclusão solicitada com sucesso!\nLista: ${numero}\n${result}`);
        document.getElementById("numeroListaGestao").value = "";
        setTimeout(carregarListasPendentes, 800);
      } catch (err) {
        alert("Erro ao apagar lista: " + err.message);
      }
    }

    // ====================== RESTO DO SEU CÓDIGO (modais, parseCtes, etc.) ======================
    // ... cole aqui todo o restante do script que você já tinha ...

    window.onload = carregarListasPendentes;
  </script>
</body>
</html>
